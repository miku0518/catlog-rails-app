default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password: password
  host: localhost

development:
  <<: *default
  database: cat_log_development

test:
  <<: *default
  database: cat_log_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
